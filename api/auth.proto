syntax = "proto3";

package auth;

import "vendor.proto/google/api/annotations.proto";
import "vendor.proto/protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/mihnpro/Auth-project-protos/auth/gen/go/authpb";

// OpenAPI/Swagger документация (дополнительно, не влияет на совместимость)
option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
    info: {
        title: "Auth Service API";
        version: "1.0";
        description: "Authentication and Authorization API";
    };
    host: "localhost:8080";
    base_path: "/api/v1";
    schemes: HTTP;
    consumes: "application/json";
    produces: "application/json";
};

// SignUpRequest for registration
message SignUpRequest {
    string email_address = 1;
    string password = 2;
    string phone_number = 3;
}

// SignUpResponse after registration
message SignUpResponse {
    uint32 user_id = 1;
    string message = 2;
}

// LoginRequest for login
message LoginRequest {
    string email_address = 1;
    string password = 2;
}

// LoginResponse after login
message LoginResponse {
    string access_token = 1;
    string refresh_token = 2;
    uint32 user_id = 3;
}

// RefreshTokenRequest for refresh token
message RefreshTokenRequest {
    string access_token = 1;
    string refresh_token = 2;
}

// RefreshTokenResponse for get new tokens
message RefreshTokenResponse {
    string access_token = 1;
    string refresh_token = 2;
}

// LogoutRequest for logout
message LogoutRequest {
    uint32 user_id = 1;
}

// LogoutResponse after logout
message LogoutResponse {
    bool success = 1;
    string message = 2;
}

// AuthService for auth in my project
service AuthService {
    // SignUp method for registration
    rpc SignUp(SignUpRequest) returns (SignUpResponse) {
        option (google.api.http) = {
            post: "/api/v1/auth/signup"
            body: "*"
        };
        // OpenAPI аннотация (дополнительно)
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "User registration";
            description: "Register a new user with email and password";
            tags: "Authentication";
        };
    }
    
    // Login method for login
    rpc Login(LoginRequest) returns (LoginResponse) {
        option (google.api.http) = {
            post: "/api/v1/auth/login"
            body: "*"
        };
        // OpenAPI аннотация (дополнительно)
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "User login";
            description: "Authenticate user and return JWT tokens";
            tags: "Authentication";
        };
    }
    
    // RefreshToken method for refresh tokens
    rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse) {
        option (google.api.http) = {
            post: "/api/v1/auth/refresh"
            body: "*"
        };
        // OpenAPI аннотация (дополнительно)
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "Refresh tokens";
            description: "Get new access and refresh tokens";
            tags: "Authentication";
        };
    }
    
    // Logout method for logout
    rpc Logout(LogoutRequest) returns (LogoutResponse) {
        option (google.api.http) = {
            post: "/api/v1/auth/logout"
            body: "*"
        };
        // OpenAPI аннотация (дополнительно)
        option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
            summary: "User logout";
            description: "Logout user and invalidate tokens";
            tags: "Authentication";
        };
    }
}